# MLX-LM LoRA config — QUICK EXPERIMENT (~30-60 min on Qwen2.5-3B, M3 Pro)
# Goal: validate pipeline, calibrate timing, see loss curve
# Not expected to produce a usable model (500 iters << 1 epoch)
#
# Switched to 3B from 7B due to OOM on M3 Pro (18GB) at seq_len 8192.
# 3B peak RSS at seq_len 8192 ~7.5 GB — plenty of headroom.
#
# Schema reference: mlx_lm 0.31.3 CONFIG_DEFAULTS + build_parser()
# Run with: python3 -m mlx_lm lora --config lora_config_exp.yaml

model: "Qwen/Qwen2.5-3B-Instruct"

train: true
data: "SEBI_CPT"

adapter_path: "SEBI_CPT/adapters_exp"
seed: 42

num_layers: 16            # 16 of 36 transformer layers (3B has 36)
lora_parameters:
  rank: 32
  alpha: 64
  dropout: 0.05
  scale: 10.0

iters: 500
batch_size: 1
grad_accumulation_steps: 1   # was 8 — OOM; 1 chunk = less activation memory
max_seq_length: 4096          # was 8192 — halve activation memory
steps_per_report: 10
steps_per_eval: 50        # 10 eval points — good loss curve visibility
save_every: 100           # 5 checkpoints — pick best later

optimizer: adamw
learning_rate: 1.0e-4
optimizer_config:
  adamw:
    betas: [0.9, 0.95]
    eps: 1.0e-8
    weight_decay: 0.01

lr_schedule:
  name: cosine_decay
  arguments: [1.0e-4, 500, 0.0]   # init, decay_steps, end
  warmup: 50
  warmup_init: 1.0e-5

grad_checkpoint: true
